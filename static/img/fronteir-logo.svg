<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="snowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e5f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="6" fill="url(#skyGrad)"/>

  <!-- Distant mountains -->
  <path
    d="M2 22 L9 12 L15 22 Z"
    fill="#0b1120"
    opacity="0.8"
  />
  <path
    d="M10 23 L18 11 L26 23 Z"
    fill="#020617"
    opacity="0.9"
  />

  <!-- Main foreground mountain -->
  <path
    d="M4 24 L16 6 L28 24 Z"
    fill="url(#mountainGrad)"
  />

  <!-- Snow cap on main mountain -->
  <path
    d="M11 17 L16 8 L21 17 L18.5 16 L16 18 L13.5 16 Z"
    fill="url(#snowGrad)"
  />

  <!-- Ground/base -->
  <rect x="2" y="24" width="28" height="4" rx="2" fill="#020617" />

  <!-- Subtle horizon glow -->
  <ellipse cx="16" cy="22.5" rx="10" ry="2.5" fill="#38bdf8" opacity="0.18" />
</svg>
